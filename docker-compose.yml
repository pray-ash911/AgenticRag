version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: langgraph_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langgraph}
      POSTGRES_DB: ${POSTGRES_DB:-langgraph_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langgraph}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - langgraph-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph_api
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langgraph}
      POSTGRES_DB: ${POSTGRES_DB:-langgraph_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      GROQ_API_KEY: ${GROQ_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - langgraph-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: langgraph_frontend
    ports:
      - "8501:8501"
    environment:
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
    depends_on:
      - api
    networks:
      - langgraph-network

volumes:
  postgres_data:

networks:
  langgraph-network:
    driver: bridge
